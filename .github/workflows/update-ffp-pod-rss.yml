name: update ffp pod rss

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Regenerate RSS
        working-directory: projects/ffp-pod-rss
        run: node scripts/generate-rss.mjs
      - name: Commit RSS changes
        run: |
          if git diff --quiet -- projects/ffp-pod-rss/public/ffp-pod/rss.xml; then
            echo "No RSS changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add projects/ffp-pod-rss/public/ffp-pod/rss.xml
          git commit -m "Update FFP Pod RSS feed"
          git push
