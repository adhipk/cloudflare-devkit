name: deploy recipes

on:
  push:
    branches: [main]
    paths:
      - recipes/**
      - projects/ffp-pod-rss/**
      - .github/workflows/deploy-recipes.yml
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: CloudFlare-personal
    strategy:
      fail-fast: false
      matrix:
        target:
          - recipes/static-html
          - recipes/hono-api
          - recipes/hono-d1-api
          - recipes/hono-r2-api
          - recipes/cron-worker
          - projects/ffp-pod-rss
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install target dependencies
        working-directory: ${{ matrix.target }}
        run: bun install
      - name: Generate types
        working-directory: ${{ matrix.target }}
        run: |
          if [ "$(bun pm pkg get scripts.types)" != "{}" ]; then
            bun run types
          else
            echo "No types script; skipping."
          fi
      - name: Dry run
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: ${{ matrix.target }}
          command: deploy --dry-run
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: ${{ matrix.target }}
          command: deploy
