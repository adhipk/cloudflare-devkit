name: deploy target

on:
  workflow_dispatch:
    inputs:
      target:
        description: Recipe or project directory to deploy
        required: true
        type: string
      command:
        description: Wrangler command to run
        required: true
        default: deploy
        type: choice
        options:
          - deploy
          - deploy --dry-run

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: CloudFlare-personal
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Install target dependencies
        working-directory: ${{ inputs.target }}
        run: bun install
      - name: Generate types
        working-directory: ${{ inputs.target }}
        run: |
          if [ "$(bun pm pkg get scripts.types)" != "{}" ]; then
            bun run types
          else
            echo "No types script; skipping."
          fi
      - name: Run Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: ${{ inputs.target }}
          command: ${{ inputs.command }}
