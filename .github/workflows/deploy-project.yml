name: deploy target

on:
  workflow_dispatch:
    inputs:
      target:
        description: Recipe or project directory to deploy
        required: true
        type: string
      command:
        description: Wrangler command to run
        required: true
        default: deploy
        type: choice
        options:
          - deploy
          - deploy --dry-run

jobs:
  deploy:
    uses: ./.github/workflows/deploy-cloudflare-worker.yml
    with:
      target: ${{ inputs.target }}
      deploy: ${{ inputs.command == 'deploy' }}
      environment: CloudFlare-personal
    secrets: inherit
