name: reusable Cloudflare Worker deploy

on:
  workflow_call:
    inputs:
      target:
        description: Worker project directory in the caller repository.
        required: false
        type: string
        default: "."
      deploy:
        description: Deploy after the dry-run succeeds.
        required: false
        type: boolean
        default: false
      environment:
        description: Optional GitHub environment for the deployment job.
        required: false
        type: string
        default: ""
      install:
        description: Install dependencies with Bun before running Wrangler.
        required: false
        type: boolean
        default: true
      generate_types:
        description: Run the target's types script when present.
        required: false
        type: boolean
        default: true
      dry_run_command:
        description: Wrangler command used for validation.
        required: false
        type: string
        default: deploy --dry-run
      deploy_command:
        description: Wrangler command used for deployment.
        required: false
        type: string
        default: deploy
    secrets:
      CLOUDFLARE_API_TOKEN:
        required: true
      CLOUDFLARE_ACCOUNT_ID:
        required: true

permissions:
  contents: read

jobs:
  deploy:
    if: ${{ inputs.environment == '' }}
    name: Deploy Cloudflare Worker
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        if: ${{ inputs.install }}
        working-directory: ${{ inputs.target }}
        run: bun install
      - name: Generate types
        if: ${{ inputs.generate_types }}
        working-directory: ${{ inputs.target }}
        run: |
          if [ "$(bun pm pkg get scripts.types)" != "{}" ]; then
            bun run types
          else
            echo "No types script; skipping."
          fi
      - name: Dry run
        uses: cloudflare/wrangler-action@v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: ${{ inputs.target }}
          command: ${{ inputs.dry_run_command }}
      - name: Deploy
        if: ${{ inputs.deploy }}
        uses: cloudflare/wrangler-action@v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: ${{ inputs.target }}
          command: ${{ inputs.deploy_command }}

  deploy-with-environment:
    if: ${{ inputs.environment != '' }}
    name: Deploy Cloudflare Worker
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        if: ${{ inputs.install }}
        working-directory: ${{ inputs.target }}
        run: bun install
      - name: Generate types
        if: ${{ inputs.generate_types }}
        working-directory: ${{ inputs.target }}
        run: |
          if [ "$(bun pm pkg get scripts.types)" != "{}" ]; then
            bun run types
          else
            echo "No types script; skipping."
          fi
      - name: Dry run
        uses: cloudflare/wrangler-action@v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: ${{ inputs.target }}
          command: ${{ inputs.dry_run_command }}
      - name: Deploy
        if: ${{ inputs.deploy }}
        uses: cloudflare/wrangler-action@v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: ${{ inputs.target }}
          command: ${{ inputs.deploy_command }}
