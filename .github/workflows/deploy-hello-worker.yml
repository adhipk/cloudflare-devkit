name: deploy hello-worker

on:
  push:
    branches: [main]
    paths:
      - projects/hello-worker/**
      - .github/workflows/deploy-hello-worker.yml
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        working-directory: projects/hello-worker
        run: bun install
      - name: Generate types
        working-directory: projects/hello-worker
        run: bun run types
      - name: Dry run
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: projects/hello-worker
          command: deploy --dry-run
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: projects/hello-worker
          command: deploy
