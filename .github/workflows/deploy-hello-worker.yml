name: deploy hello-worker

on:
  push:
    branches: [main]
    paths:
      - projects/hello-worker/**
      - .github/workflows/deploy-hello-worker.yml
      - .github/workflows/deploy-cloudflare-worker.yml
  workflow_dispatch:

jobs:
  deploy:
    uses: ./.github/workflows/deploy-cloudflare-worker.yml
    with:
      target: projects/hello-worker
      deploy: true
      environment: CloudFlare-personal
    secrets: inherit
