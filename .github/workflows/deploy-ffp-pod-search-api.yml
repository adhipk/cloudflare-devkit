name: Deploy FFP Pod Search API

on:
  push:
    branches: [main]
    paths:
      - "projects/ffp-pod-search-api/**"
      - ".github/workflows/deploy-ffp-pod-search-api.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/ffp-pod-search-api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: projects/ffp-pod-search-api/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run check

      - name: Deploy Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
